<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Mój chatbot</title>
</head>
<body>
    <h1>Mój chatbot</h1>

    {% for message in history %}
        <p>{{ message.role }}: {{ message.parts[0].text }}</p>
    {% endfor %}

    <form method="post">
        <input type="text" name="prompt">
        <button type="submit">Wyślij</button>
    </form>
</body>
</html>
